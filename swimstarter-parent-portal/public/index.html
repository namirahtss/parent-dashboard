<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b6fb8" />
  <title>TheSwimStarter — Parent Portal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- LOGIN -->
  <section id="login-screen" class="screen active">
    <div class="login-wrap">
      <div class="brand">
        <div class="brand-logo">🏊</div>
        <h1>TheSwimStarter</h1>
        <p class="brand-sub">Parent Portal</p>
      </div>
      <form id="login-form" class="card">
        <label for="phone">Mobile number</label>
        <input id="phone" name="phone" type="tel" inputmode="numeric" autocomplete="tel"
               placeholder="e.g. 9111 0007" required />
        <button type="submit" class="btn btn-primary" id="login-btn">Log in</button>
        <p class="hint">Log in with the mobile number registered with us.</p>
        <p id="login-error" class="error-msg" hidden></p>
      </form>
    </div>
  </section>

  <!-- APP -->
  <section id="app-screen" class="screen">
    <!-- desktop sidebar -->
    <aside class="sidebar">
      <div class="side-brand">
        <span class="side-logo">🏊</span>
        <div><div class="side-title">Parent Portal</div><div class="side-sub">TheSwimStarter</div></div>
      </div>
      <nav class="side-nav">
        <button class="navbtn active" data-view="home"><span>🏠</span> Home</button>
        <button class="navbtn" data-view="book"><span>➕</span> Class Booking</button>
        <button class="navbtn" data-view="schedule"><span>📅</span> Class Schedule</button>
        <button class="navbtn" data-view="payment"><span>💳</span> Payment</button>
        <button class="navbtn" data-view="more"><span>⋯</span> More</button>
      </nav>
      <div class="side-foot">
        <div class="side-user" id="side-user"></div>
        <button class="btn btn-ghost" id="side-logout">Log out</button>
      </div>
    </aside>

    <div class="app-main">
      <header class="app-header">
        <div>
          <div class="hello" id="hello">Hello</div>
          <div class="app-title" id="page-title">Home</div>
        </div>
        <button class="icon-btn" id="logout-btn" title="Log out">⎋</button>
      </header>

      <!-- child switcher -->
      <div id="child-switcher" class="child-switcher" hidden></div>

      <main id="views">
        <div id="view-home" class="view active"></div>
        <div id="view-book" class="view"></div>
        <div id="view-schedule" class="view"></div>
        <div id="view-payment" class="view"></div>
        <div id="view-more" class="view"></div>
      </main>

      <nav class="tabbar">
        <button class="navbtn tab active" data-view="home"><span>🏠</span>Home</button>
        <button class="navbtn tab" data-view="book"><span>➕</span>Class Booking</button>
        <button class="navbtn tab" data-view="schedule"><span>📅</span>Class Schedule</button>
        <button class="navbtn tab" data-view="payment"><span>💳</span>Payment</button>
        <button class="navbtn tab" data-view="more"><span>⋯</span>More</button>
      </nav>
    </div>
  </section>

  <!-- toast + modal -->
  <div id="toast" class="toast" hidden></div>
  <div id="modal-backdrop" class="modal-backdrop" hidden>
    <div class="modal" id="modal"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
