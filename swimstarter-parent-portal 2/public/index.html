<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b6fb8" />
  <title>TheSwimStarter — Parent Portal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- LOGIN -->
  <section id="login-screen" class="screen active">
    <div class="login-wrap">
      <div class="brand">
        <div class="brand-logo">🏊</div>
        <h1>TheSwimStarter</h1>
        <p class="brand-sub">Parent Portal</p>
      </div>
      <form id="login-form" class="card">
        <label for="phone">Mobile number</label>
        <input id="phone" name="phone" type="tel" inputmode="numeric" autocomplete="tel"
               placeholder="e.g. 9111 0007" required />
        <button type="submit" class="btn btn-primary" id="login-btn">Log in</button>
        <p class="hint">Log in with the mobile number registered with us.</p>
        <p id="login-error" class="error-msg" hidden></p>
      </form>
    </div>
  </section>

  <!-- APP -->
  <section id="app-screen" class="screen">
    <header class="app-header">
      <div>
        <div class="hello" id="hello">Hello</div>
        <div class="app-title" id="page-title">Home</div>
      </div>
      <button class="icon-btn" id="logout-btn" title="Log out">⎋</button>
    </header>

    <!-- child switcher -->
    <div id="child-switcher" class="child-switcher" hidden></div>

    <main id="views">
      <div id="view-home" class="view active"></div>
      <div id="view-book" class="view"></div>
      <div id="view-schedule" class="view"></div>
      <div id="view-payment" class="view"></div>
      <div id="view-progress" class="view"></div>
      <div id="view-support" class="view"></div>
      <div id="view-notices" class="view"></div>
      <div id="view-more" class="view"></div>
    </main>

    <nav class="tabbar">
      <button class="tab active" data-view="home"><span>🏠</span>Home</button>
      <button class="tab" data-view="book"><span>➕</span>Book</button>
      <button class="tab" data-view="schedule"><span>📅</span>Schedule</button>
      <button class="tab" data-view="payment"><span>💳</span>Pay</button>
      <button class="tab" data-view="more"><span>⋯</span>More</button>
    </nav>
  </section>

  <!-- toast + modal -->
  <div id="toast" class="toast" hidden></div>
  <div id="modal-backdrop" class="modal-backdrop" hidden>
    <div class="modal" id="modal"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
